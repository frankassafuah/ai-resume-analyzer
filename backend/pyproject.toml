[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

# This file exists to declare dependencies, not to package the Django code
# (it runs from the working dir / container WORKDIR, never from site-packages).
# Tell setuptools there are no importable packages to build, so it doesn't try
# to auto-discover apps/ and config/ as distributions.
[tool.setuptools]
py-modules = []

[project]
name = "ai-resume-analyzer-backend"
version = "0.1.0"
description = "AI Resume Analyzer — Django/DRF backend"
requires-python = ">=3.12"
dependencies = [
    "Django>=5.1,<5.2",
    "djangorestframework>=3.15",
    "django-filter>=24.3,<25",
    "drf-spectacular>=0.27",
    "djangorestframework-simplejwt>=5.3",
    "django-allauth>=65.0",
    "django-cors-headers>=4.4",
    "django-environ>=0.11",
    "django-storages>=1.14",
    "boto3>=1.35",
    "psycopg[binary]>=3.2",
    "pgvector>=0.3",
    "celery>=5.4",
    "redis>=5.0",
    "gunicorn>=23.0",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-django>=4.9",
    "django-stubs>=5.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Django writes these; don't lint machine-generated files.
extend-exclude = ["**/migrations/*", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["tests.py", "test_*.py", "*_tests.py"]

[tool.mypy]
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "config.settings.dev"
